<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>给宝宝的小问题</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, Arial;
    background: linear-gradient(135deg, #ffe6f0, #fff5f8);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 92%;
    max-width: 520px;
    background: white;
    padding: 28px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

/* pages */
.page { display: none; }
.active { display: block; }

/* buttons */
.btn {
    padding: 12px 18px;
    border: none;
    border-radius: 18px;
    font-size: 16px;
    margin: 10px;
    transition: 0.2s;
    touch-action: manipulation;
}

.yes {
    background: #ff6fa5;
    color: white;
}

.no {
    background: #ddd;
    color: #333;
    position: relative;
}

/* layout */
.btnRow {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    min-height: 60px;
}
</style>
</head>

<body>

<div class="card">

    <!-- PAGE 1 -->
    <div class="page active" id="p1">
        <h1>你好呀，宝宝 ❤️</h1>
        <p>我想问你几个小问题，可以吗？</p>
        <button class="btn yes" onclick="go(2)">可以</button>
    </div>

    <!-- PAGE 2 -->
    <div class="page" id="p2">
        <h2>第一个问题</h2>
        <p>如果有一天我们一起出去，你会期待吗？</p>

        <div class="btnRow">
            <button class="btn yes" onclick="go(3)">会</button>
            <button class="btn no" id="no1">不会</button>
        </div>
    </div>

    <!-- PAGE 3 -->
    <div class="page" id="p3">
        <h2>第二个问题</h2>
        <p>如果我们见面，你会紧张吗？</p>

        <div class="btnRow">
            <button class="btn yes" onclick="go(4)">可能会</button>
            <button class="btn no" id="no2">不会</button>
        </div>
    </div>

    <!-- PAGE 4 -->
    <div class="page" id="p4">
        <h2>第三个问题</h2>
        <p>和我聊天，你开心吗？</p>

        <div class="btnRow">
            <button class="btn yes" onclick="go(5)">开心</button>
            <button class="btn no" id="no3">不确定</button>
        </div>
    </div>

    <!-- YES RESULT -->
    <div class="page" id="p5">
        <h2>真的吗？🥺❤️</h2>
        <p style="line-height:1.6;">
            我会好好珍惜这一天。<br><br>
            不会给你压力，只想让你开心一点。<br><br>
            谢谢你愿意这样回答我。
        </p>
    </div>

    <!-- NO RESULT -->
    <div class="page" id="p6">
        <h2>没关系 ❤️</h2>
        <p style="line-height:1.6;">
            真的不用有压力。<br><br>
            我只是想问问，不会在意答案。<br><br>
            还是很开心认识你。
        </p>
    </div>

</div>

<script>

/* PAGE SYSTEM */
function go(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("p" + page).classList.add("active");
}

/* MOBILE SAFE REJECT BUTTON (TOUCH + CLICK) */
function setupNo(id) {
    const btn = document.getElementById(id);
    let count = 0;

    function dodge() {
        count++;

        // after a few tries → becomes normal clickable
        if (count > 4) {
            btn.innerText = "好吧...点我";
            btn.onclick = () => go(6);
            btn.onmouseover = null;
            btn.ontouchstart = null;
            btn.style.position = "relative";
            btn.style.left = "0";
            return;
        }

        const parent = btn.parentElement;
        const maxX = parent.clientWidth - btn.clientWidth;

        const x = Math.random() * maxX;

        btn.style.position = "relative";
        btn.style.left = x + "px";

        const texts = ["不要～", "再想想", "真的不吗🥺", "别点这个"];
        btn.innerText = texts[count - 1] || "不要";
    }

    // iPhone + PC support
    btn.onclick = dodge;
    btn.ontouchstart = dodge;
    btn.onmouseover = dodge;
}

/* INIT */
setupNo("no1");
setupNo("no2");
setupNo("no3");

</script>

</body>
</html>
